<style>
     .page__eyecatch {
          display: block !important;
          visibility: visible !important;
          opacity: 1 !important;
          margin: 1.5rem 0 2rem;
     }

     .page__eyecatch img {
          display: block !important;
          visibility: visible !important;
          opacity: 1 !important;
          width: 100%;
          max-width: 100%;
          height: auto;
          border-radius: 12px;
     }

     .page__eyecatch figcaption {
          margin-top: 0.5rem;
          font-size: 0.85em;
          color: #5c6670;
     }

     .toc--collapsible > summary {
          cursor: pointer;
          list-style: none;
     }

     .toc--collapsible > summary::-webkit-details-marker {
          display: none;
     }

     .toc--collapsible > summary .nav__title {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 0.75rem;
          margin: 0;
     }

     .toc--collapsible > summary .nav__title::after {
          content: "+";
          font-size: 1.1rem;
          line-height: 1;
     }

     .toc--collapsible[open] > summary .nav__title::after {
          content: "-";
     }

     .toc--collapsible nav {
          margin-top: 0.75rem;
     }
</style>

<script>
     document.addEventListener("DOMContentLoaded", function () {
          var article = document.querySelector("article.page");
          if (!article) return;
          if (article.querySelector(".page__eyecatch")) return;

          var title = article.querySelector("#page-title");
          if (!title) return;

          var header = title.closest("header");
          if (!header) return;

          var ogImage = document.querySelector('meta[property="og:image"]');
          if (!ogImage || !ogImage.content) return;

          var src = ogImage.content;
          var origin = window.location.origin;
          if (src.indexOf(origin) === 0) {
               src = src.slice(origin.length);
          }

          if (src === "/assets/images/icon.jpg") return;
          if (src.indexOf("/assets/article_images/") !== 0) return;

          var figure = document.createElement("figure");
          figure.className = "page__eyecatch";

          var img = document.createElement("img");
          img.src = src;
          img.alt = title.textContent.trim();
          img.loading = "eager";

          figure.appendChild(img);
          header.appendChild(figure);
     });
</script>
